format = "$all$custom$line_break$character"

[localip]
ssh_only = false
format = '@[$localipv4](bold red) '
disabled = false

[directory]
truncation_length = 8
truncation_symbol = '…/'

[memory_usage]
disabled = false
threshold = -1
symbol = ' '
style = 'bold dimmed green'

[git_status]
conflicted = '🏳'
ahead = '🏎💨'
behind = '😰'
diverged = '😵'
up_to_date = '✓'
untracked = '🤷'
stashed = '📦'
modified = '📝'
staged = '[++\($count\)](green)'
renamed = '👅'
deleted = '🗑'

[custom.uptime]
command = "uptime -p | sed 's/up //' | sed 's/ days\\?,/d/' | sed 's/ hours\\?,/h/' | sed 's/ minutes\\?/m/'"
when = true
symbol = "up "
style = "bold yellow"
format = "[$symbol$output]($style) "

[custom.temp]
command = "vcgencmd measure_temp | sed \"s/temp=//;s/'C//\""
when = "command -v vcgencmd > /dev/null 2>&1"
symbol = "T:"
style = "bold red"
format = "[$symbol${output}°C]($style) "

[custom.temp_riscv]
command = "awk '{printf \"%.0f\", $1/1000}' /sys/class/thermal/thermal_zone0/temp"
when = "test -f /sys/class/thermal/thermal_zone0/temp && ! command -v vcgencmd > /dev/null 2>&1"
symbol = "T:"
style = "bold red"
format = "[$symbol${output}°C]($style) "

[custom.containers]
command = "docker ps -q 2>/dev/null | wc -l | tr -d ' '"
when = "docker ps -q 2>/dev/null | grep -q ."
symbol = "🐋 "
style = "bold blue"
format = "[$symbol$output]($style) "
